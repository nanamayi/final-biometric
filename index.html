
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biometric Key Logging System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .gradient-bg {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    }
    .gradient-btn {
      background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
    }
    
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes title-reveal {
      0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
    .animate-title-opening {
      animation: title-reveal 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes fade-out-splash {
      0% { opacity: 1; visibility: visible; }
      90% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
    .splash-overlay {
      animation: fade-out-splash 2.5s ease-in-out forwards;
    }

    @keyframes letter-spacing-anim {
      0% { letter-spacing: 10px; opacity: 0; }
      100% { letter-spacing: -1px; opacity: 1; }
    }
    .animate-letter-reveal {
      animation: letter-spacing-anim 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes subtle-glow {
      0%, 100% { text-shadow: 0 0 10px rgba(99, 102, 241, 0); }
      50% { text-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
    }
    .glow-text {
      animation: subtle-glow 3s ease-in-out infinite;
    }
  </style>

</body>
</html>
